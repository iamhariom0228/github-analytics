app = "github-analytics-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  JAVA_OPTS = "-Xms64m -Xmx200m -XX:+UseSerialGC -Djava.security.egd=file:/dev/./urandom"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
