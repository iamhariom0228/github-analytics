# Render infrastructure-as-code
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, set these env vars manually in the Render dashboard
# (marked sync: false below). Everything else is wired automatically.

services:
  - type: web
    name: github-analytics-backend
    runtime: docker
    rootDir: backend
    branch: master
    autoDeploy: true
    healthCheckPath: /api/v1/actuator/health
    envVars:
      # ── Database ──────────────────────────────────────────────────────────
      # Copy the "JDBC Connection String" from the Render database dashboard.
      # It looks like: jdbc:postgresql://host:5432/gitanalytics?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        fromDatabase:
          name: github-analytics-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: github-analytics-db
          property: password

      # ── Redis (Upstash) ───────────────────────────────────────────────────
      # Sign up at upstash.com, create a Redis DB, paste the rediss:// URL.
      - key: REDIS_URL
        sync: false

      # ── Secrets ───────────────────────────────────────────────────────────
      # openssl rand -hex 32
      - key: JWT_SECRET
        generateValue: true
      # Exactly 32 characters for AES-256-GCM
      - key: ENCRYPTION_KEY
        sync: false

      # ── GitHub OAuth App ──────────────────────────────────────────────────
      # Create at github.com/settings/developers
      # Callback URL: https://<your-render-service>.onrender.com/api/v1/auth/github/callback
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false

      # ── CORS / Frontend ───────────────────────────────────────────────────
      # Set to your Vercel app URL after deploying frontend
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

      # ── Fixed values ──────────────────────────────────────────────────────
      - key: COOKIE_SECURE
        value: "true"
      - key: JAVA_TOOL_OPTIONS
        value: "-Xms128m -Xmx384m -XX:+UseSerialGC -XX:+UseContainerSupport -Djava.security.egd=file:/dev/./urandom"

      # ── Optional ──────────────────────────────────────────────────────────
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: github-analytics-db
    databaseName: gitanalytics
    plan: free
