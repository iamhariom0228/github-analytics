spring:
  application:
    name: github-analytics

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gitanalytics}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  jwt:
    secret: ${JWT_SECRET:changeme-use-256-bit-secret-in-production-env-var}
    expiration-ms: 900000  # 15 minutes
    refresh-token-ttl-seconds: 2592000  # 30 days

  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/v1/auth/github/callback}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    webhook-url: ${GITHUB_WEBHOOK_URL:}

  groq:
    api-key: ${GROQ_API_KEY:}

  encryption:
    key: ${ENCRYPTION_KEY:changeme-32-byte-key-for-aes-gcm!}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  cookie-secure: ${COOKIE_SECURE:true}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  redis:
    dashboard-cache-ttl: 300        # 5 min
    oauth-state-ttl: 600            # 10 min
    rate-limit-ttl: 3600            # 1 hr
    sync-lock-ttl: 1800             # 30 min — extended to prevent lock expiry on large repo syncs
    streak-cache-ttl: 3600          # 1 hr
    analytics-cache-ttl: 3600       # 1 hr — synced data (heatmap, overview, trends, etc.)
    ai-summary-cache-ttl: 21600     # 6 hr — expensive Groq API calls
    feed-cache-ttl: 900             # 15 min — near-live data (activity feed, review queue, stale PRs)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.gitanalytics: INFO
    org.springframework.security: WARN
