# Step 1: HTTP — used only for Let's Encrypt ACME challenge + redirect
server {
    listen 80;
    server_name YOUR_DOMAIN.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

