spring:
  kafka:
    consumer:
      auto-startup: false
  flyway:
    enabled: true
  jpa:
    show-sql: true

app:
  jwt:
    secret: test-jwt-secret-that-is-long-enough-for-hs256-algorithm-at-least-32-chars
    expiration-ms: 3600000
    refresh-token-ttl-seconds: 2592000
  github:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/v1/auth/github/callback
    webhook-secret: test-webhook-secret
  encryption:
    key: test-32-byte-key-for-aes-gcmXX
  cors:
    allowed-origins: http://localhost:3000
  redis:
    dashboard-cache-ttl: 300
    oauth-state-ttl: 600
    rate-limit-ttl: 3600
    sync-lock-ttl: 300
    streak-cache-ttl: 3600

logging:
  level:
    com.gitanalytics: WARN
    org.springframework: WARN
